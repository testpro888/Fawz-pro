<!DOCTYPE html>
<html lang="id">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Login</title>
  <link rel="icon" type="image/png" href="assets/logo/fawz.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d0d2b; --purple: #2d1b69;
      --gold: #f5a623; --gold-light: #ffc857;
      --white: #ffffff; --gray: #8888aa;
      --border: rgba(255,255,255,0.12);
    }
    body { font-family: 'Inter', sans-serif; background: var(--navy); min-height: 100vh; display: flex; overflow: hidden; }

    /* LEFT */
    .left-panel {
      width: 55%; position: relative;
      background: linear-gradient(145deg, #0a0a22 0%, #1a0e4a 40%, #0d0d2b 100%);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .left-panel::before {
      content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
      top: -100px; left: -100px; animation: pulse 6s ease-in-out infinite;
    }
    .left-panel::after {
      content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(93,63,211,0.2) 0%, transparent 70%);
      bottom: -80px; right: -80px; animation: pulse 8s ease-in-out infinite reverse;
    }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:.8; } 50% { transform:scale(1.1); opacity:1; } }

    .left-content { position: relative; z-index: 2; text-align: center; padding: 40px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .brand-logo { width: 340px; max-width: 80%; filter: drop-shadow(0 0 30px rgba(245,166,35,0.45)); animation: floatLogo 4s ease-in-out infinite; }
    @keyframes floatLogo { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }

    .geo { position: absolute; border: 1px solid rgba(245,166,35,0.15); border-radius: 4px; animation: rotate 20s linear infinite; }
    .geo-1 { width:80px; height:80px; top:15%; right:10%; animation-duration:25s; }
    .geo-2 { width:40px; height:40px; bottom:20%; left:8%; animation-duration:18s; }
    .geo-3 { width:120px; height:120px; top:60%; right:5%; border-color:rgba(93,63,211,0.2); animation-duration:30s; animation-direction:reverse; }
    @keyframes rotate { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

    /* RIGHT */
    .right-panel { width: 45%; display: flex; align-items: center; justify-content: center; background: #f7f8fc; padding: 60px 50px; }
    .login-card { width: 100%; max-width: 400px; }
    .login-header { margin-bottom: 32px; }
    .login-header h2 { font-family: 'Inter', sans-serif; font-size: 1.85rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; letter-spacing: -0.5px; }
    .login-header p { font-size: 0.88rem; color: #999; font-weight: 400; }
    .login-header-line { width: 36px; height: 3px; background: linear-gradient(90deg, #f5a623, #ffc857); border-radius: 2px; margin-top: 10px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #444; margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 13px 16px 13px 46px;
      border: 1.5px solid #e0e0ef; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--navy);
      background: #fff; transition: border 0.2s, box-shadow 0.2s; outline: none;
    }
    .input-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,166,35,0.12); }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 1.05rem; }
    .eye-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; user-select: none; display:flex; align-items:center; padding:4px; border-radius:4px; transition: color 0.2s; }
    .eye-toggle:hover { color: #666; }
    .eye-toggle svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .remember-row label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #666; cursor: pointer; }
    .remember-row input[type="checkbox"] { accent-color: var(--gold); width: 16px; height: 16px; }
    .forgot { font-size: 0.85rem; color: var(--gold); text-decoration: none; font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #f5a623, #e8931a);
      border: none; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600; color: #fff;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(245,166,35,0.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(245,166,35,0.45); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .login-footer { margin-top: 28px; text-align: center; font-size: 0.78rem; color: #999; }

    .msg-box { border-radius: 10px; padding: 11px 15px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .msg-error { background: #fff0f0; border: 1px solid #ffcccc; color: #c0392b; }
    .msg-success { background: #f0fff4; border: 1px solid #a8e6c1; color: #27ae60; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) { .left-panel { display: none; } .right-panel { width: 100%; padding: 40px 24px; } }
  </style>
</head>
<body>

<div class="left-panel">
  <div class="geo geo-1"></div>
  <div class="geo geo-2"></div>
  <div class="geo geo-3"></div>
  <div class="left-content">
    <img src="assets/logo/fawzpro.png" alt="FAWZ Pro" class="brand-logo"
      onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'"/>
    <div id="logoFallback" style="display:none; text-align:center;">
      <div style="font-size:5rem; line-height:1;">🦁</div>
      <div style="font-size:2.5rem; font-weight:700; color:#f5a623; letter-spacing:4px; margin-top:8px;">FAWZ</div>
      <div style="font-size:0.7rem; color:rgba(245,166,35,0.55); letter-spacing:5px; margin-top:4px;">BEYOND GENERATIONS</div>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="login-card">
    <div class="login-header">
      <h2>Selamat Datang</h2>
      <p>Masuk ke akun Fawz Pro Anda</p>
      <div class="login-header-line"></div>
    </div>

    <div class="msg-box msg-error" id="msgError"></div>
    <div class="msg-box msg-success" id="msgSuccess"></div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
        <span class="eye-toggle" id="eyeToggle" onclick="togglePwd()" title="Tampilkan/sembunyikan password">
          <svg id="eyeIconShow" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeIconHide" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </span>
      </div>
    </div>

    <div class="remember-row">
      <label><input type="checkbox" id="remember"/> Ingat saya</label>
      <a href="#" class="forgot">Lupa password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Masuk Sekarang</span>
    </button>

    <div class="login-footer">
      © 2026 PT Fawz Finansial Indonesia
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = (window.__FAWZ_CONFIG__ || {}).supabaseUrl || '';
    const SUPABASE_KEY = (window.__FAWZ_CONFIG__ || {}).supabaseKey || '';
  const _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window._supabase = _supabaseClient;
  window._supabaseReady = true;

  // Jika sudah login, redirect
  const saved = sessionStorage.getItem('fawz_user') || localStorage.getItem('fawz_user_remember');
  if (saved) {
    sessionStorage.setItem('fawz_user', saved);
    window.location.href = 'dashboard.html';
  }
</script>

<script>
  function togglePwd() {
    const p = document.getElementById('password');
    const iconShow = document.getElementById('eyeIconShow');
    const iconHide = document.getElementById('eyeIconHide');
    const isHidden = p.type === 'password';
    p.type = isHidden ? 'text' : 'password';
    iconShow.style.display = isHidden ? 'none' : '';
    iconHide.style.display = isHidden ? '' : 'none';
  }

  function showMsg(type, text) {
    document.getElementById('msgError').style.display = 'none';
    document.getElementById('msgSuccess').style.display = 'none';
    const el = document.getElementById(type === 'error' ? 'msgError' : 'msgSuccess');
    el.textContent = text;
    el.style.display = 'block';
  }

  function setLoading(on) {
    const btn = document.getElementById('loginBtn');
    const txt = document.getElementById('btnText');
    btn.disabled = on;
    if (on) {
      txt.textContent = '';
      const sp = document.createElement('div');
      sp.className = 'spinner';
      sp.id = 'spinner';
      btn.appendChild(sp);
    } else {
      const sp = document.getElementById('spinner');
      if (sp) sp.remove();
      txt.textContent = 'Masuk Sekarang';
    }
  }

  let _loginAttempts = 0;
  let _loginLockedUntil = 0;

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showMsg('error', '⚠️ Username dan password wajib diisi.');
      return;
    }

    // Brute-force protection
    if (Date.now() < _loginLockedUntil) {
      const sisa = Math.ceil((_loginLockedUntil - Date.now()) / 1000);
      showMsg('error', `⏳ Terlalu banyak percobaan. Coba lagi dalam ${sisa} detik.`);
      return;
    }

    setLoading(true);

    try {
      if (!window._supabaseReady) throw new Error('Supabase tidak tersedia');

      const { data, error } = await window._supabase
        .from('accounts')
        .select('id, username, name, role')
        .eq('username', username)
        .eq('password', password)
        .single();

      // PGRST116 = no rows found (akun tidak ada / salah password)
      if (error && error.code !== 'PGRST116') throw error;

      if (data) {
        _loginAttempts = 0;
        // Simpan hanya data non-sensitif — tidak menyimpan password
        const sessionUser = {
          username: data.username,
          name:     data.name,
          role:     data.role,
          id:       data.id || null
        };
        sessionStorage.setItem('fawz_user', JSON.stringify(sessionUser));

        if (document.getElementById('remember').checked) {
          // Simpan dengan expiry 30 hari
          const expiry = Date.now() + 30 * 24 * 60 * 60 * 1000;
          localStorage.setItem('fawz_user_remember', JSON.stringify({ ...sessionUser, _exp: expiry }));
        } else {
          // Simpan session biasa dengan expiry 8 jam agar tab baru tidak logout
          const expiry = Date.now() + 8 * 60 * 60 * 1000;
          localStorage.setItem('fawz_user_remember', JSON.stringify({ ...sessionUser, _exp: expiry }));
        }

        showMsg('success', '✅ Login berhasil! Mengalihkan...');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } else {
        _loginAttempts++;
        if (_loginAttempts >= 5) {
          _loginLockedUntil = Date.now() + 30_000; // kunci 30 detik
          _loginAttempts = 0;
          showMsg('error', '🔒 Terlalu banyak percobaan. Akun dikunci 30 detik.');
        } else {
          showMsg('error', `❌ Username atau password salah. (${_loginAttempts}/5)`);
        }
        document.getElementById('password').value = '';
        setLoading(false);
      }
    } catch (err) {
      console.error('Login error:', err);
      showMsg('error', '⚠️ Gagal terhubung ke server. Periksa koneksi internet Anda.');
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
