<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Cek Data Firebase</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyDHuo14lBr18NG6SN-7M4Rbj2RPJ4Wg2gE",
      authDomain:        "fawzpro-a831d.firebaseapp.com",
      projectId:         "fawzpro-a831d",
      storageBucket:     "fawzpro-a831d.firebasestorage.app",
      messagingSenderId: "176423029682",
      appId:             "1:176423029682:web:04a77c32c228ae2a0cf2ab"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);

    async function checkData() {
      const log = document.getElementById('log');
      log.innerHTML = '🔍 Mengambil 5 data sample dari Firebase...\n\n';

      try {
        const q = query(collection(db, 'customers'), limit(5));
        const snap = await getDocs(q);
        
        log.innerHTML += `✅ Berhasil ambil ${snap.size} data\n\n`;
        log.innerHTML += '═══════════════════════════════════════\n\n';

        snap.forEach((doc, idx) => {
          const data = doc.data();
          log.innerHTML += `📄 Document ${idx + 1} (ID: ${doc.id})\n`;
          log.innerHTML += '─────────────────────────────────────\n';
          log.innerHTML += JSON.stringify(data, null, 2);
          log.innerHTML += '\n\n═══════════════════════════════════════\n\n';
        });

        // Tampilkan semua field yang ada
        const allFields = new Set();
        snap.forEach(doc => {
          Object.keys(doc.data()).forEach(key => allFields.add(key));
        });

        log.innerHTML += '\n📋 Semua field yang ditemukan:\n';
        log.innerHTML += '─────────────────────────────────────\n';
        Array.from(allFields).sort().forEach(field => {
          log.innerHTML += `  • ${field}\n`;
        });

      } catch (e) {
        log.innerHTML += `❌ Error: ${e.message}\n`;
        console.error(e);
      }
    }

    window.addEventListener('DOMContentLoaded', checkData);
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
    }
    h1 {
      color: #4ec9b0;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    #log {
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 8px;
      padding: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      line-height: 1.6;
      max-height: 80vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>🔍 Firebase Data Inspector</h1>
  <div id="log">Loading...</div>
</body>
</html>
