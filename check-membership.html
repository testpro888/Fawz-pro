<!DOCTYPE html>
<html lang="id">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Cek Membership</title>
  <link rel="icon" type="image/png" href="assets/logo/fawz.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d0d2b;
      --gold: #f5a623;
      --gold-light: #ffc857;
      --bg: #f4f5fb;
      --white: #ffffff;
      --nav-h: 68px;
      --border: #e0e0ef;
      --text: #1a1a3a;
      --gray: #888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding-top: var(--nav-h);
      color: var(--text);
    }

    /* PAGE */
    .page-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 28px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: var(--gray);
    }

    .title-underline {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* CARD */
    .check-card {
      background: var(--white);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--navy);
      background: #fff;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.12);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 1.1rem;
    }

    .btn-check {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold), #e8931a);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(245,166,35,0.35);
    }

    .btn-check:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,166,35,0.45);
    }

    .btn-check:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* RESULT */
    .result-box {
      margin-top: 28px;
      padding: 24px;
      border-radius: 14px;
      display: none;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-box.show { display: block; }

    .result-box.member {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border: 1.5px solid #66bb6a;
    }

    .result-box.non-member {
      background: linear-gradient(135deg, #fbe9e7, #ffccbc);
      border: 1.5px solid #ef5350;
    }

    .result-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .result-status {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-email {
      font-size: 0.88rem;
      color: #555;
    }

    .member .result-status { color: #2e7d32; }
    .non-member .result-status { color: #c62828; }

    /* ERROR */
    .error-msg {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff5f5;
      border: 1px solid #ffcdd2;
      border-radius: 10px;
      color: #c62828;
      font-size: 0.85rem;
      display: none;
      text-align: center;
    }

    .error-msg.show { display: block; }

    /* HISTORY */
    .history-section {
      margin-top: 32px;
    }

    .history-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .history-list {
      list-style: none;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f9f9ff;
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-item:hover {
      background: #fff8ec;
    }

    .history-email {
      color: var(--navy);
      font-weight: 500;
    }

    .history-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .history-badge.member {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .history-badge.non-member {
      background: #fbe9e7;
      color: #c62828;
    }

    .history-clear {
      font-size: 0.75rem;
      color: var(--gold);
      cursor: pointer;
      font-weight: 600;
      float: right;
      margin-bottom: 8px;
    }

    .history-clear:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .page-container { padding: 28px 16px; }
      .check-card { padding: 24px 18px; }
      .page-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<div id="navbar-placeholder"></div>

<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">Cek Status Membership</h1>
    <p class="page-subtitle">Masukkan email untuk mengecek apakah terdaftar sebagai member Petik Profit</p>
    <div class="title-underline"></div>
  </div>

  <div class="check-card">
    <form id="checkForm" onsubmit="handleCheck(event)">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input type="email" id="emailInput" placeholder="contoh@email.com" required autocomplete="email"/>
        </div>
      </div>

      <button type="submit" class="btn-check" id="btnCheck">
        Cek Membership
      </button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-status" id="resultStatus"></div>
      <div class="result-email" id="resultEmail"></div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none;">
      <span class="history-clear" onclick="clearHistory()">Hapus Riwayat</span>
      <div class="history-title">Riwayat Pencarian</div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

</div>

<!-- Navbar JS -->
<script src="navbar.js"></script>
<script>
(function() {
  // Load navbar
  fetch('navbar.html')
    .then(r => r.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const nav = doc.querySelector('.fawz-navbar');
      const drawer = doc.querySelector('.mobile-drawer');
      const overlay = doc.querySelector('.drawer-overlay');
      const placeholder = document.getElementById('navbar-placeholder');
      if (nav) placeholder.appendChild(nav);
      if (overlay) placeholder.appendChild(overlay);
      if (drawer) placeholder.appendChild(drawer);
    })
    .catch(() => {});
})();

const STORAGE_KEY = 'fawz_membership_history';
const MAX_HISTORY = 10;

// Load history on page load
document.addEventListener('DOMContentLoaded', renderHistory);

async function handleCheck(e) {
  e.preventDefault();

  const email = document.getElementById('emailInput').value.trim();
  const btn = document.getElementById('btnCheck');
  const errorEl = document.getElementById('errorMsg');
  const resultEl = document.getElementById('resultBox');

  // Reset
  errorEl.classList.remove('show');
  resultEl.classList.remove('show', 'member', 'non-member');

  if (!email) return;

  // Disable button
  btn.disabled = true;
  btn.textContent = 'Mengecek...';

  try {
    const cfg = window.__FAWZ_CONFIG__ || {};
    const baseUrl = cfg.petikProfitUrl || 'https://pp.ikutin.id';

    const res = await fetch(baseUrl + '/api/membership/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      throw new Error(errData?.message || 'Gagal menghubungi server (HTTP ' + res.status + ')');
    }

    const data = await res.json();

    if (!data.success) {
      throw new Error(data.message || 'Terjadi kesalahan');
    }

    const isMember = data.data.is_member;
    const status = data.data.membership_status;

    // Show result
    resultEl.classList.add('show', isMember ? 'member' : 'non-member');
    document.getElementById('resultIcon').textContent = isMember ? '✅' : '❌';
    document.getElementById('resultStatus').textContent = isMember ? 'MEMBER AKTIF' : 'NON-MEMBER';
    document.getElementById('resultEmail').textContent = data.data.email;

    // Save to history
    saveHistory(email, status);

  } catch (err) {
    errorEl.textContent = err.message || 'Terjadi kesalahan. Coba lagi.';
    errorEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Cek Membership';
  }
}

// History functions
function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveHistory(email, status) {
  let history = getHistory();
  // Remove duplicate
  history = history.filter(h => h.email !== email);
  // Add to top
  history.unshift({ email, status, time: new Date().toISOString() });
  // Limit
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = getHistory();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = history.map(h => `
    <li class="history-item" onclick="fillEmail('${h.email}')">
      <span class="history-email">${h.email}</span>
      <span class="history-badge ${h.status === 'member' ? 'member' : 'non-member'}">${h.status}</span>
    </li>
  `).join('');
}

function fillEmail(email) {
  document.getElementById('emailInput').value = email;
  document.getElementById('emailInput').focus();
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}
</script>

</body>
</html>
