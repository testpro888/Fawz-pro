<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Pasar Perdana Obligasi (IPO)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://yhmrfluehibfapvtxcfi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobXJmbHVlaGliZmFwdnR4Y2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjEzODUsImV4cCI6MjA5NDczNzM4NX0.se_H4n_eLsf81d_1GH5sqsPCpX89MHewlPuuNkY6qcU';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window._supabase = supabase;
    window.addEventListener('DOMContentLoaded', () => initPage());
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0d0d2b;
      --purple:     #1e1252;
      --gold:       #f5a623;
      --gold-light: #ffc857;
      --bg:         #f4f5fb;
      --white:      #ffffff;
      --border:     #e0e0ef;
      --text:       #1a1a3a;
      --gray:       #8888aa;
      --nav-h:      68px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding-top: var(--nav-h);
      color: var(--text);
    }

    /* ── PAGE LAYOUT ── */
    .page-container { max-width: 1200px; margin: 0 auto; padding: 40px 28px; }

    .page-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 16px; margin-bottom: 32px;
    }
    .page-title {
      font-size: 1.75rem; font-weight: 700;
      color: var(--navy); line-height: 1.15;
    }
    .page-title span { color: var(--gold); }
    .page-subtitle { font-size: .85rem; color: var(--gray); margin-top: 4px; }
    .title-bar { width: 36px; height: 3px; background: var(--gold); border-radius: 2px; margin-top: 8px; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 24px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: .82rem;
      font-weight: 600; cursor: pointer; border: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover  { opacity: .88; }
    .btn-primary { background: var(--gold); color: #fff; }
    .btn-outline { background: #fff; color: var(--navy); border: 1.5px solid var(--border); }
    .btn-danger  { background: #fff0f0; color: #e74c3c; border: 1.5px solid #ffd0d0; }
    .btn-sm { padding: 6px 13px; font-size: .78rem; }

    /* ── STAT CARDS ── */
    .stat-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-card {
      flex: 1; min-width: 130px;
      background: #fff; border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
    }
    .stat-card .sc-label { font-size: .7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .stat-card .sc-val   { font-size: 1.6rem; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-card .sc-val.gold { color: var(--gold); }
    .stat-card .sc-val.green { color: #27ae60; }
    .stat-card .sc-val.blue  { color: #2980b9; }

    /* ── IPO GRID ── */
    .ipo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── IPO CARD ── */
    .ipo-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 14px rgba(0,0,0,.06);
      overflow: hidden; transition: box-shadow .2s, transform .2s;
      display: flex; flex-direction: column;
    }
    .ipo-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.1); transform: translateY(-2px); }

    .ipo-card-header {
      background: linear-gradient(120deg, var(--navy) 0%, #1a0e4a 100%);
      padding: 20px 20px 16px;
      position: relative; overflow: hidden;
    }
    .ipo-card-header::after {
      content: ''; position: absolute;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(245,166,35,.07);
      top: -30px; right: -30px;
    }
    .ipo-badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: .65rem; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase; margin-bottom: 10px;
    }
    .badge-open-ipo   { background: #e8f8f0; color: #27ae60; }
    .badge-coming     { background: #fff3e0; color: #e67e22; }
    .badge-closed-ipo { background: #f5f5f5; color: #999; }

    .ipo-seri  { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .ipo-issuer { font-size: .78rem; color: rgba(255,255,255,.55); }

    .ipo-card-body { padding: 18px 20px; flex: 1; }

    .ipo-fields {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px 16px; margin-bottom: 16px;
    }
    .ipo-field label {
      display: block; font-size: .62rem; font-weight: 700;
      color: var(--gray); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 3px;
    }
    .ipo-field .fval { font-size: .95rem; font-weight: 600; color: var(--text); }
    .fval-gold  { color: var(--gold) !important; }
    .fval-green { color: #27ae60 !important; }

    .ipo-period {
      background: #f8f8ff; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 14px;
      display: flex; gap: 20px;
    }
    .ipo-period .per-item label { font-size: .62rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .7px; display: block; margin-bottom: 2px; }
    .ipo-period .per-item span  { font-size: .82rem; font-weight: 600; color: var(--navy); }

    .ipo-desc {
      font-size: .78rem; color: var(--gray); line-height: 1.55;
      border-top: 1px solid #f0f0f8; padding-top: 12px; margin-bottom: 14px;
    }

    .ipo-card-footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f8;
      display: flex; justify-content: space-between; align-items: center;
      background: #fafafa;
    }
    .ipo-update { font-size: .72rem; color: #ccc; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; text-align: center;
    }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: #f0f0f8;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .empty-icon svg { opacity: .35; }
    .empty-title { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
    .empty-sub   { font-size: .83rem; color: var(--gray); max-width: 320px; line-height: 1.6; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 18px;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 22px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.span2 { grid-column: span 2; }
    .form-group label { font-size: .72rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .7px; }
    .form-input, .form-select, .form-textarea {
      padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: .85rem; color: var(--text);
      outline: none; transition: border .2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-textarea { resize: vertical; min-height: 72px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--navy); color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: .83rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      z-index: 9999; opacity: 0; transform: translateY(10px);
      transition: opacity .3s, transform .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #27ae60; }
    .toast.error   { background: #e74c3c; }

    /* ── LOADING ── */
    .loading-wrap { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--gray); font-size: .85rem; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #eee; border-top-color: var(--gold);
      animation: spin .7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .ipo-grid { animation: fadeUp .4s ease; }
  </style>
</head>
<body>

<!-- ===== NAVBAR PLACEHOLDER ===== -->
<div id="navbar-placeholder"></div>
<script src="navbar.js"></script>

<!-- ===== PAGE ===== -->
<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="page-title">Pasar Perdana <span>Obligasi</span></div>
      <div class="page-subtitle">IPO & penawaran umum obligasi baru | data diperbarui secara manual</div>
      <div class="title-bar"></div>
    </div>
    <div id="adminActions" style="display:none; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="openAddModal()">+ Tambah IPO</button>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="sc-label">Total IPO</div>
      <div class="sc-val" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Masa Penawaran</div>
      <div class="sc-val green" id="statOpen">—</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Segera Dibuka</div>
      <div class="sc-val gold" id="statComing">—</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Sudah Ditutup</div>
      <div class="sc-val" id="statClosed" style="color:#bbb">—</div>
    </div>
  </div>

  <!-- IPO Grid -->
  <div class="ipo-grid" id="ipoGrid">
    <div class="loading-wrap">
      <div class="spinner"></div>
      Memuat data IPO...
    </div>
  </div>

</div>

<!-- ===== MODAL ADD / EDIT ===== -->
<div class="modal-overlay" id="ipoModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Tambah IPO Obligasi</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Seri Obligasi</label>
        <input class="form-input" id="fSeri" placeholder="cth. BBRI05"/>
      </div>
      <div class="form-group">
        <label>Penerbit</label>
        <input class="form-input" id="fIssuer" placeholder="cth. Bank BRI"/>
      </div>
      <div class="form-group">
        <label>Kupon (%)</label>
        <input class="form-input" id="fKupon" type="number" step="0.001" placeholder="0.000"/>
      </div>
      <div class="form-group">
        <label>Tenor (Tahun)</label>
        <input class="form-input" id="fTenor" type="number" step="0.5" placeholder="cth. 5"/>
      </div>
      <div class="form-group">
        <label>Minimum Pembelian (Rp)</label>
        <input class="form-input" id="fMinBeli" type="number" step="1000000" placeholder="cth. 5000000"/>
      </div>
      <div class="form-group">
        <label>Target Dana (Rp Miliar)</label>
        <input class="form-input" id="fTarget" type="number" placeholder="cth. 1000"/>
      </div>
      <div class="form-group">
        <label>Tanggal Mulai Penawaran</label>
        <input class="form-input" id="fTglMulai" type="date"/>
      </div>
      <div class="form-group">
        <label>Tanggal Akhir Penawaran</label>
        <input class="form-input" id="fTglAkhir" type="date"/>
      </div>
      <div class="form-group">
        <label>Tanggal Jatuh Tempo</label>
        <input class="form-input" id="fJatuhTempo" type="date"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-select" id="fStatus">
          <option value="open">Masa Penawaran</option>
          <option value="coming">Segera Dibuka</option>
          <option value="closed">Sudah Ditutup</option>
        </select>
      </div>
      <div class="form-group span2">
        <label>Rating</label>
        <input class="form-input" id="fRating" placeholder="cth. AAA(idn) / Fitch"/>
      </div>
      <div class="form-group span2">
        <label>Keterangan</label>
        <textarea class="form-textarea" id="fKeterangan" placeholder="Deskripsi singkat atau catatan IPO..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveIPO()">Simpan</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
  const COL_IPO = 'ipo_obligasi';
  let ipoItems = [];
  let editId    = null;
  let curUser   = null;
  const ROLE_LABELS = { head_account: 'Head Account', admin: 'Admin', sales: 'Sales', treasury: 'Bonds' };

  // ── HELPERS ──────────────────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function fmtRp(val) {
    if (!val && val !== 0) return '—';
    return 'Rp ' + Number(val).toLocaleString('id-ID');
  }

  function fmtDate(val) {
    if (!val) return '—';
    try {
      const d = typeof val.toDate === 'function' ? val.toDate() : new Date(val);
      return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return val; }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function getStatusLabel(s) {
    if (s === 'open')   return { label: 'Masa Penawaran', cls: 'badge-open-ipo' };
    if (s === 'coming') return { label: 'Segera Dibuka',  cls: 'badge-coming'   };
    return                       { label: 'Sudah Ditutup', cls: 'badge-closed-ipo' };
  }

  function canManage() {
    return curUser && ['head_account', 'treasury', 'admin'].includes(curUser.role);
  }

  // ── NAVBAR LOADER ─────────────────────────────────────────────────────────
  // navbar.js sudah di-load via <script src> di atas — cukup baca curUser dari sessionStorage
  async function loadNavbar() {
    const raw = sessionStorage.getItem('fawz_user') || localStorage.getItem('fawz_user_remember');
    if (!raw) { window.location.href = 'login.html'; return; }
    curUser = JSON.parse(raw);
  }

  // ── LOAD DATA ─────────────────────────────────────────────────────────────
  async function loadIPO() {
    try {
      const { data, error } = await window._supabase.from(COL_IPO).select('*').order('created_at', { ascending: false });
      if (error) throw error;
      ipoItems = data || [];
    } catch (e) {
      console.warn('Koleksi IPO belum ada atau gagal load:', e);
      ipoItems = [];
    }
    renderGrid();
    renderStats();
  }

  // ── RENDER STATS ──────────────────────────────────────────────────────────
  function renderStats() {
    document.getElementById('statTotal').textContent  = ipoItems.length;
    document.getElementById('statOpen').textContent   = ipoItems.filter(i => i.status === 'open').length;
    document.getElementById('statComing').textContent = ipoItems.filter(i => i.status === 'coming').length;
    document.getElementById('statClosed').textContent = ipoItems.filter(i => i.status === 'closed').length;
  }

  // ── RENDER GRID ───────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('ipoGrid');

    if (!ipoItems.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#0d0d2b" stroke-width="1.5">
              <path d="M9 12h6m-3-3v6M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/>
            </svg>
          </div>
          <div class="empty-title">Saat ini tidak ada IPO Obligasi yang tersedia</div>
          <div class="empty-sub">Belum ada penawaran umum obligasi yang dibuka. Pantau terus halaman ini untuk informasi IPO terbaru.</div>
        </div>`;
      return;
    }

    grid.innerHTML = ipoItems.map(item => {
      const st  = getStatusLabel(item.status);
      const can = canManage();
      return `
        <div class="ipo-card">
          <div class="ipo-card-header">
            <span class="ipo-badge ${st.cls}">${st.label}</span>
            <div class="ipo-seri">${esc(item.seri || '—')}</div>
            <div class="ipo-issuer">${esc(item.issuer || '—')}</div>
          </div>
          <div class="ipo-card-body">
            <div class="ipo-fields">
              <div class="ipo-field">
                <label>Kupon</label>
                <div class="fval fval-gold">${item.kupon != null ? Number(item.kupon).toFixed(3) + '%' : '—'}</div>
              </div>
              <div class="ipo-field">
                <label>Tenor</label>
                <div class="fval">${item.tenor != null ? item.tenor + ' Tahun' : '—'}</div>
              </div>
              <div class="ipo-field">
                <label>Min. Pembelian</label>
                <div class="fval" style="font-size:.82rem">${item.minBeli != null ? fmtRp(item.minBeli) : '—'}</div>
              </div>
              <div class="ipo-field">
                <label>Target Dana</label>
                <div class="fval" style="font-size:.82rem">${item.target != null ? 'Rp ' + Number(item.target).toLocaleString('id-ID') + ' M' : '—'}</div>
              </div>
              <div class="ipo-field">
                <label>Rating</label>
                <div class="fval fval-green">${esc(item.rating || '—')}</div>
              </div>
              <div class="ipo-field">
                <label>Jatuh Tempo</label>
                <div class="fval" style="font-size:.82rem">${fmtDate(item.jatuhTempo)}</div>
              </div>
            </div>

            <div class="ipo-period">
              <div class="per-item">
                <label>Mulai Penawaran</label>
                <span>${fmtDate(item.tglMulai)}</span>
              </div>
              <div class="per-item">
                <label>Akhir Penawaran</label>
                <span>${fmtDate(item.tglAkhir)}</span>
              </div>
            </div>

            ${item.keterangan ? `<div class="ipo-desc">${esc(item.keterangan)}</div>` : ''}
          </div>
          <div class="ipo-card-footer">
            <span class="ipo-update">Update: ${fmtDate(item.updatedAt || item.createdAt)}</span>
            ${can ? `
              <div style="display:flex;gap:8px;">
                <button class="btn btn-outline btn-sm" onclick="openEditModal('${item.id}')">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteIPO('${item.id}')">Hapus</button>
              </div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── MODAL ─────────────────────────────────────────────────────────────────
  function openAddModal() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'Tambah IPO Obligasi';
    document.getElementById('modalSaveBtn').textContent = 'Simpan';
    ['fSeri','fIssuer','fKupon','fTenor','fMinBeli','fTarget','fTglMulai','fTglAkhir','fJatuhTempo','fRating','fKeterangan']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('fStatus').value = 'open';
    document.getElementById('ipoModal').classList.add('open');
  }

  function openEditModal(id) {
    const item = ipoItems.find(i => i.id === id);
    if (!item) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'Edit IPO Obligasi';
    document.getElementById('modalSaveBtn').textContent = 'Perbarui';

    const g = (fid, val) => { document.getElementById(fid).value = val || ''; };
    g('fSeri',       item.seri);
    g('fIssuer',     item.issuer);
    g('fKupon',      item.kupon);
    g('fTenor',      item.tenor);
    g('fMinBeli',    item.minBeli);
    g('fTarget',     item.target);
    g('fRating',     item.rating);
    g('fKeterangan', item.keterangan);
    g('fStatus',     item.status || 'open');

    // date fields
    const toInput = (val) => {
      if (!val) return '';
      try {
        const d = typeof val.toDate === 'function' ? val.toDate() : new Date(val);
        return d.toISOString().slice(0, 10);
      } catch { return ''; }
    };
    document.getElementById('fTglMulai').value    = toInput(item.tglMulai);
    document.getElementById('fTglAkhir').value    = toInput(item.tglAkhir);
    document.getElementById('fJatuhTempo').value  = toInput(item.jatuhTempo);

    document.getElementById('ipoModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('ipoModal').classList.remove('open');
  }

  // ── SAVE ──────────────────────────────────────────────────────────────────
  async function saveIPO() {
    const seri = document.getElementById('fSeri').value.trim();
    if (!seri) { showToast('Seri obligasi wajib diisi', 'error'); return; }

    const btn = document.getElementById('modalSaveBtn');
    btn.disabled = true; btn.textContent = 'Menyimpan...';

    const payload = {
      seri:        seri.toUpperCase(),
      issuer:      document.getElementById('fIssuer').value.trim(),
      kupon:       parseFloat(document.getElementById('fKupon').value) || null,
      tenor:       parseFloat(document.getElementById('fTenor').value) || null,
      minBeli:     parseFloat(document.getElementById('fMinBeli').value) || null,
      target:      parseFloat(document.getElementById('fTarget').value) || null,
      rating:      document.getElementById('fRating').value.trim(),
      keterangan:  document.getElementById('fKeterangan').value.trim(),
      status:      document.getElementById('fStatus').value,
      tglMulai:    document.getElementById('fTglMulai').value   || null,
      tglAkhir:    document.getElementById('fTglAkhir').value   || null,
      jatuhTempo:  document.getElementById('fJatuhTempo').value || null,
      updatedAt:   new Date().toISOString(),
    };

    try {
      if (editId) {
        const { error } = await window._supabase.from(COL_IPO).update(payload).eq('id', editId);
        if (error) throw error;
        showToast('IPO berhasil diperbarui', 'success');
      } else {
        payload.created_at = new Date().toISOString();
        const { error } = await window._supabase.from(COL_IPO).insert(payload);
        if (error) throw error;
        showToast('IPO berhasil ditambahkan', 'success');
      }
      closeModal();
      await loadIPO();
    } catch (e) {
      console.error(e);
      showToast('Gagal menyimpan: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = editId ? 'Perbarui' : 'Simpan';
    }
  }

  // ── DELETE ────────────────────────────────────────────────────────────────
  async function deleteIPO(id) {
    const item = ipoItems.find(i => i.id === id);
    if (!confirm(`Hapus IPO "${item?.seri || id}"?`)) return;
    try {
      const { error } = await window._supabase.from(COL_IPO).delete().eq('id', id);
      if (error) throw error;
      showToast('IPO dihapus', 'success');
      await loadIPO();
    } catch (e) {
      showToast('Gagal menghapus: ' + e.message, 'error');
    }
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function initPage() {
    await loadNavbar();

    // Show admin actions for privileged roles
    if (canManage()) {
      document.getElementById('adminActions').style.display = 'flex';
    }

    await loadIPO();
  }

  // Close modal on overlay click
  document.addEventListener('click', e => {
    if (e.target.id === 'ipoModal') closeModal();
  });
</script>

</body>
</html>
