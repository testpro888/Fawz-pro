<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAWZ PRO - Data Obligasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .table-container { height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav id="navbar-placeholder" class="bg-[#050038] text-white px-6 py-2 shadow-xl sticky top-0 z-50"></nav>

    <main class="p-6 max-w-[1600px] mx-auto">
        <div class="mb-8">
            <h1 class="text-2xl font-black text-gray-800">Data Obligasi Pasar Sekunder</h1>
            <p class="text-xs text-gray-500">Kelola 4 kategori obligasi pemerintah dan korporasi.</p>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
            <div id="section-Gov-IDR"></div>
            <div id="section-Gov-USD"></div>
            <div id="section-Corp-IDR"></div>
            <div id="section-Corp-USD"></div>
        </div>
    </main>

    <script>
        // 1. FUNGSI PANGGIL NAVBAR
        fetch('../navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            });

        // 2. FUNGSI GENERATE TABEL
        function renderCategory(id, title, icon, color) {
            const container = document.getElementById(`section-${id}`);
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h2 class="text-xs font-black text-blue-900 uppercase tracking-widest flex items-center">
                            <i class="${icon} mr-2 ${color}"></i> ${title}
                        </h2>
                        <button class="bg-blue-600 text-white text-[9px] px-3 py-1.5 rounded font-black hover:bg-blue-800 transition shadow-sm">+ TAMBAH</button>
                    </div>
                    <div class="table-container">
                        <table class="w-full text-[11px] text-left">
                            <thead class="bg-gray-100 text-gray-500 sticky top-0 z-10 uppercase font-bold text-[10px] border-b">
                                <tr>
                                    <th class="p-3">Seri</th>
                                    <th class="p-3 text-center">Kupon</th>
                                    <th class="p-3">Jatuh Tempo</th>
                                    <th class="p-3">Harga Jual</th>
                                    <th class="p-3">Harga Beli</th>
                                    <th class="p-3">Yield</th>
                                    <th class="p-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="body-${id}"></tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // 3. ISI DATA DUMMY (10 DATA PER TABEL)
        const generateData = (seriPrefix, count = 10) => Array.from({length: count}, (_, i) => ({
            s: `${seriPrefix}${10 + i}`, k: "7.25%", t: "12-Des-28", j: "102.40", b: "101.90", y: "6.80%"
        }));

        function fillTable(id, data) {
            const tbody = document.getElementById(`body-${id}`);
            tbody.innerHTML = data.map(item => `
                <tr class="border-b hover:bg-blue-50/40 transition">
                    <td class="p-3 font-black text-blue-800">${item.s}</td>
                    <td class="p-3 text-center font-bold">${item.k}</td>
                    <td class="p-3 text-gray-400">${item.t}</td>
                    <td class="p-3 text-green-600 font-black">${item.j}</td>
                    <td class="p-3 text-red-600 font-black">${item.b}</td>
                    <td class="p-3 font-black text-blue-900">${item.y}</td>
                    <td class="p-3 text-center text-gray-300">
                        <button class="hover:text-blue-600 mr-1"><i class="fas fa-edit"></i></button>
                        <button class="hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // Inisialisasi Tampilan
        renderCategory('Gov-IDR', 'Obligasi Pemerintah IDR', 'fas fa-landmark', 'text-yellow-500');
        renderCategory('Gov-USD', 'Obligasi Pemerintah USD', 'fas fa-dollar-sign', 'text-green-600');
        renderCategory('Corp-IDR', 'Obligasi Korporasi IDR', 'fas fa-building', 'text-blue-500');
        renderCategory('Corp-USD', 'Obligasi Korporasi USD', 'fas fa-globe-americas', 'text-indigo-600');

        fillTable('Gov-IDR', generateData('FR00'));
        fillTable('Gov-USD', generateData('INDON'));
        fillTable('Corp-IDR', generateData('CORP'));
        fillTable('Corp-USD', generateData('GBL'));
    </script>
</body>
</html>
