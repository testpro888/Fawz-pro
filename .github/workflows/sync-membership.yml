name: Sync Membership Status

on:
  schedule:
    # Jam 12 malam WIB = 17:00 UTC (WIB = UTC+7)
    - cron: '0 17 * * *'
  workflow_dispatch: # Bisa trigger manual dari GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync agent membership status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PETIK_PROFIT_URL: ${{ secrets.PETIK_PROFIT_URL }}
        run: |
          cat << 'EOF' > sync.js
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_KEY;
          const PP_URL = process.env.PETIK_PROFIT_URL || 'https://pp.ikutin.id';

          async function supabaseRequest(path, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1/${path}`;
            const res = await fetch(url, {
              ...options,
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': options.method === 'PATCH' ? 'return=minimal' : 'return=representation',
                ...(options.headers || {})
              }
            });
            if (!res.ok) {
              const text = await res.text();
              throw new Error(`Supabase ${res.status}: ${text}`);
            }
            if (options.method === 'PATCH') return null;
            return res.json();
          }

          async function checkMembership(email) {
            try {
              const res = await fetch(`${PP_URL}/api/membership/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ email })
              });
              if (!res.ok) return null;
              const json = await res.json();
              if (!json.success || !json.data) return null;
              return json.data.is_member === true ? 'premium' : 'free';
            } catch(e) {
              console.warn(`[Membership] Error checking ${email}:`, e.message);
              return null;
            }
          }

          async function main() {
            console.log('🔄 Starting membership sync at', new Date().toISOString());

            // Fetch all agents
            const agents = await supabaseRequest('referral_agents?select=id,email,fee_status');
            console.log(`📋 Found ${agents.length} agents`);

            let updated = 0;
            let skipped = 0;
            let errors = 0;

            // Process in batches of 5
            const BATCH = 5;
            for (let i = 0; i < agents.length; i += BATCH) {
              const batch = agents.slice(i, i + BATCH);
              await Promise.all(batch.map(async (agent) => {
                if (!agent.email) { skipped++; return; }

                const newStatus = await checkMembership(agent.email);
                if (newStatus === null) { errors++; return; }

                const currentStatus = agent.fee_status || 'free';
                if (newStatus === currentStatus) { skipped++; return; }

                // Update in Supabase
                try {
                  await supabaseRequest(`referral_agents?id=eq.${agent.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ fee_status: newStatus })
                  });
                  console.log(`  ✅ ${agent.email}: ${currentStatus} → ${newStatus}`);
                  updated++;
                } catch(e) {
                  console.error(`  ❌ ${agent.email}: update failed -`, e.message);
                  errors++;
                }
              }));

              // Small delay between batches to respect rate limit
              if (i + BATCH < agents.length) {
                await new Promise(r => setTimeout(r, 2000));
              }
            }

            console.log('');
            console.log('═══════════════════════════════════');
            console.log(`✅ Updated: ${updated}`);
            console.log(`⏭️  Skipped (no change): ${skipped}`);
            console.log(`❌ Errors: ${errors}`);
            console.log('═══════════════════════════════════');
            console.log('🏁 Sync complete at', new Date().toISOString());
          }

          main().catch(e => { console.error('Fatal:', e); process.exit(1); });
          EOF

          node sync.js
