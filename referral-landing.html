<!DOCTYPE html>
<html lang="id">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Daftar via Referral</title>
  <link rel="icon" type="image/png" href="assets/logo/fawz.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = (window.__FAWZ_CONFIG__ || {}).supabaseUrl || '';
    const SUPABASE_KEY = (window.__FAWZ_CONFIG__ || {}).supabaseKey || '';
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 24px;
      text-align: center;
    }
    .logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      overflow: hidden;
    }
    .logo-box img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      border-left: 6px solid #f5a623;
    }

    .card-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 32px;
    }

    /* ── FIELD ── */
    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 15px 18px;
      border: 1.5px solid #e8e8e8;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #c0c0c0; }
    .field input:focus {
      border-color: #f5a623;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(245,166,35,0.12);
    }

    /* Kode referral — readonly, abu-abu */
    .field input.ref-readonly {
      background: #f0f0f0;
      color: #888;
      font-weight: 600;
      letter-spacing: 1.5px;
      cursor: default;
    }
    .field input.ref-readonly:focus {
      border-color: #e8e8e8;
      box-shadow: none;
    }

    /* State valid → border hijau, invalid → border merah */
    .field.ref-valid   input { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.10); }
    .field.ref-invalid input { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.10); }

    .field-error {
      font-size: 0.75rem;
      color: #ef4444;
      margin-top: 6px;
      display: none;
    }
    .field.has-error input   { border-color: #ef4444; }
    .field.has-error .field-error { display: block; }

    /* ── BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 17px;
      background: linear-gradient(90deg, #f5a623 0%, #ffc107 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 20px rgba(245,166,35,0.40);
      letter-spacing: 0.3px;
    }
    .btn-submit:hover  { opacity: 0.92; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SUCCESS STATE ── */
    .success-wrap { display: none; text-align: center; padding: 12px 0; }
    .success-wrap.show { display: block; }
    .success-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #edfff3;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .success-title { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; margin-bottom: 10px; }
    .success-sub   { font-size: 0.88rem; color: #999; line-height: 1.7; }
    .success-badge {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: monospace;
      background: #f4f5fb;
      color: #5a5aaa;
      padding: 9px 20px;
      border-radius: 10px;
      letter-spacing: 2px;
      border: 1.5px solid #e0e0f5;
    }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: #bbb;
      text-align: center;
    }

    @media (max-width: 540px) {
      .card { padding: 30px 22px; border-left-width: 5px; border-radius: 20px; }
      .card-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-box">
      <img src="assets/logo/fawzpro.png" alt="FAWZ Pro"
        onerror="this.style.display='none'"/>
    </div>
  </div>

  <!-- CARD -->
  <div class="card" id="mainCard">

    <!-- FORM -->
    <div id="formWrap">
      <div class="card-title">Isi Data Kamu</div>
      <div class="card-subtitle">Sebelum melanjutkan, lengkapi form berikut</div>

      <form id="regForm" onsubmit="handleSubmit(event)" novalidate>

        <div class="field" id="fldNama">
          <label for="iNama">Nama Lengkap</label>
          <input type="text" id="iNama" placeholder="Masukkan nama lengkap" autocomplete="name"/>
          <div class="field-error">Nama lengkap wajib diisi</div>
        </div>

        <div class="field" id="fldRef">
          <label for="iRef">Kode Referral</label>
          <input type="text" id="iRef" placeholder="Masukkan kode referral" autocomplete="off"
            oninput="this.value=this.value.toUpperCase(); onRefInput(this.value)"/>
          <div class="field-error" id="errRef">Kode referral tidak ditemukan</div>
        </div>

        <div class="field" id="fldEmail">
          <label for="iEmail">Email</label>
          <input type="email" id="iEmail" placeholder="Masukkan email kamu" autocomplete="email"/>
          <div class="field-error">Email tidak valid</div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">Lanjutkan</button>

      </form>
    </div>

    <!-- SUCCESS -->
    <div class="success-wrap" id="successWrap">
      <div class="success-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title" id="sTitle">Terima kasih!</div>
      <div class="success-sub" id="sSub">Data kamu sudah kami terima.<br/>Tim Fawz Pro akan segera menghubungi kamu.</div>
      <div class="success-badge" id="sBadge"></div>
    </div>

  </div>

  <div class="page-footer">© 2025 Fawz Pro · Your Leading Source to Every Investment</div>

<script>
  // ─── Init: baca ?ref= dari URL, auto-fill + readonly ─────────────────────
  let _agentData  = null;
  let _refTimer   = null;
  let _refVerified = false;  // true = kode sudah dicek dan valid

  (function () {
    const ref = new URLSearchParams(window.location.search).get('ref') || '';
    if (!ref) return;
    const input = document.getElementById('iRef');
    input.value = ref.toUpperCase();
    input.classList.add('ref-readonly');
    input.readOnly = true;
    verifyRef(ref.toUpperCase(), true); // silent=true: langsung cek tanpa debounce
  })();

  // ─── Dipanggil saat user mengetik di field referral ──────────────────────
  function onRefInput(val) {
    clearTimeout(_refTimer);
    _agentData   = null;
    _refVerified = false;
    setRefUI('idle');
    document.getElementById('fldRef').classList.remove('has-error');

    if (val.length < 3) return;

    _refTimer = setTimeout(() => verifyRef(val, false), 500);
  }

  // ─── Verifikasi kode referral ke Supabase ────────────────────────────────
  async function verifyRef(code, silent) {
    if (!code) return;
    try {
      const { data: rows, error } = await _sb
        .from('referral_agents')
        .select('id, nama, client_name, agent_code')
        .eq('agent_code', code)
        .limit(1);
      const data = rows && rows.length > 0 ? rows[0] : null;

      if (error) throw error;

      if (data) {
        _agentData   = data;
        _refVerified = true;
        const agentName = data.nama || data.client_name || '';
        setRefUI('valid');
        document.getElementById('fldRef').classList.remove('has-error');
      } else {
        _agentData   = null;
        _refVerified = false;
        if (!silent) {
          setRefUI('invalid');
        }
      }
    } catch (e) {
      _agentData   = null;
      _refVerified = false;
      if (!silent) setRefUI('idle');
    }
  }

  // ─── Update UI status field referral ─────────────────────────────────────
  function setRefUI(state) {
    const fld = document.getElementById('fldRef');
    fld.classList.remove('ref-valid', 'ref-invalid');
    if (state === 'valid')   fld.classList.add('ref-valid');
    if (state === 'invalid') fld.classList.add('ref-invalid');
  }

  // ─── Validasi form ────────────────────────────────────────────────────────
  function setErr(id, show) {
    document.getElementById(id).classList.toggle('has-error', show);
  }

  async function validate() {
    let ok = true;

    const nama = document.getElementById('iNama').value.trim();
    setErr('fldNama', !nama);
    if (!nama) ok = false;

    const ref = document.getElementById('iRef').value.trim().toUpperCase();
    // Jika belum diverifikasi, coba sekali lagi saat submit
    if (!_refVerified && ref) {
      await verifyRef(ref, false);
    }
    const refOk = _refVerified && !!_agentData;
    setErr('fldRef', !refOk);
    if (!refOk) {
      document.getElementById('errRef').textContent =
        ref ? 'Kode referral tidak terdaftar' : 'Kode referral wajib diisi';
      ok = false;
    }
    const email = document.getElementById('iEmail').value.trim();
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    setErr('fldEmail', !emailOk);
    if (!emailOk) ok = false;

    return ok;
  }

  // ─── Submit ───────────────────────────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Memproses...';

    const ok = await validate();
    if (!ok) {
      btn.disabled = false;
      btn.textContent = 'Lanjutkan';
      return;
    }

    const nama  = document.getElementById('iNama').value.trim();
    const ref   = document.getElementById('iRef').value.trim().toUpperCase();
    const email = document.getElementById('iEmail').value.trim();

    try {
      const { error } = await _sb
        .from('referral_registrations')
        .insert({
          nama,
          email,
          referral_code:    ref,
          agent_id:         _agentData?.id   ?? null,
          agent_name:       _agentData ? (_agentData.nama || _agentData.client_name) : null,
          status:           'belum_terdaftar',
          confirmed_status: 'pending',
          created_at:       new Date().toISOString()
        });

      if (error) throw error;
      showSuccess(nama, ref);

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = 'Lanjutkan';
      alert('Gagal mengirim data: ' + (err.message || err));
    }
  }

  // ─── Tampilkan sukses ─────────────────────────────────────────────────────
  function showSuccess(nama, ref) {
    document.getElementById('formWrap').style.display = 'none';
    const sw = document.getElementById('successWrap');
    sw.classList.add('show');
    document.getElementById('sTitle').textContent =
      'Terima kasih, ' + nama.split(' ')[0] + '!';
    document.getElementById('sBadge').textContent = 'Kode Referral: ' + ref;
  }
</script>
</body>
</html>
