<!DOCTYPE html>
<html lang="id">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Influencer Fan</title>
  <link rel="icon" type="image/png" href="assets/logo/fawz.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = (window.__FAWZ_CONFIG__ || {}).supabaseUrl || '';
    const SUPABASE_KEY = (window.__FAWZ_CONFIG__ || {}).supabaseKey || '';
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window._supabase = _sb;
    (function() {
      const raw = sessionStorage.getItem('fawz_user') || localStorage.getItem('fawz_user_remember');
      if (!raw) { window.location.replace('login.html'); return; }
      window._curUser = JSON.parse(raw);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d0d2b; --navy2: #16163a; --gold: #f5a623; --gold2: #ffc857;
      --bg: #f4f5fb; --white: #fff; --nav-h: 68px; --border: #e0e0ef;
      --text: #1a1a3a; --gray: #888; --green: #10b981; --red: #ef4444;
      --purple: #7c3aed;
      --shadow-sm: 0 1px 4px rgba(13,13,43,0.07);
      --shadow-md: 0 6px 20px rgba(13,13,43,0.10);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; padding-top: var(--nav-h); color: var(--text); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .page-container { max-width: 1400px; margin: 0 auto; padding: 36px 28px; }

    /* Header */
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; animation: fadeUp 0.4s ease both; }
    .page-title { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1.1; }
    .page-subtitle { font-size: 0.88rem; color: var(--gray); margin-top: 4px; }
    .title-underline { width: 48px; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; margin-top: 8px; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; animation: fadeUp 0.4s 0.05s ease both; }
    .stat-box { background: var(--white); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
    .stat-box-label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 6px; }
    .stat-box-val { font-size: 1.9rem; font-weight: 800; color: var(--navy); }

    /* Toolbar */
    .toolbar { background: var(--white); border-radius: 14px; padding: 14px 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); animation: fadeUp 0.4s 0.08s ease both; }
    .search-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-wrap input { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Inter',sans-serif; font-size: 0.875rem; color: var(--text); outline: none; transition: border 0.2s; background: #fafbff; }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bbb; pointer-events: none; }
    .total-badge { font-size: 0.8rem; font-weight: 600; color: var(--gray); white-space: nowrap; }

    /* Table */
    .table-card { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s 0.1s ease both; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead { background: #fafafa; border-bottom: 2px solid #f0f0f5; }
    thead th { padding: 13px 16px; text-align: left; font-size: 0.68rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f5f5fa; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fffbf3; }
    tbody td { padding: 13px 16px; color: var(--text); vertical-align: middle; }
    .empty-state { text-align: center; padding: 80px 20px; color: #c0c0d8; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .table-footer { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f0f0f5; font-size: 0.82rem; color: var(--gray); }

    /* Mono */
    .mono { font-family: 'Courier New', monospace; font-size: 0.78rem; color: var(--navy); background: #f0f0fa; padding: 2px 7px; border-radius: 5px; letter-spacing: 0.5px; font-weight: 700; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 0.84rem; font-weight: 600; box-shadow: 0 16px 48px rgba(13,13,43,0.16); opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .page-container { padding: 20px 16px; } }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>
<script src="navbar.js"></script>

<div class="page-container">
  <div class="page-header">
    <div>
      <div class="page-title">Influencer Fan</div>
      <div class="page-subtitle">Daftar fan yang menggunakan kode influencer</div>
      <div class="title-underline"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <div id="lastUpdated" style="font-size:0.78rem;color:var(--gray);"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-box-label">Total Fan</div><div class="stat-box-val" id="statTotal" style="color:var(--purple);">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Total Influencer</div><div class="stat-box-val" id="statInfluencer" style="color:var(--gold);">—</div></div>
    <div class="stat-box"><div class="stat-box-label">Total Sekuritas</div><div class="stat-box-val" id="statSekuritas" style="color:var(--green);">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="Cari email, nama, Client ID, atau Influencer..." oninput="applyFilter()"/>
    </div>
    <div class="total-badge" id="totalBadge">0 data</div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Email</th>
            <th>Nama</th>
            <th>Client ID</th>
            <th>Influencer</th>
            <th>Sekuritas</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⏳</div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer">
      <div id="tableInfo">Menampilkan 0 data</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let _all = [], _filtered = [];

  function _esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2600);
  }

  async function loadData() {
    try {
      // Ambil data dari influencer_fan_codes
      const { data: fans, error } = await window._supabase
        .from('influencer_fan_codes')
        .select('*')
        .order('updated_at', { ascending: false });
      if (error) throw error;

      // Ambil semua client_id unik untuk lookup nama dari customers
      const clientIds = [...new Set((fans || []).map(f => f.client_id).filter(Boolean))];
      let customerMap = {};

      if (clientIds.length > 0) {
        const { data: customers, error: custErr } = await window._supabase
          .from('customers')
          .select('client_id, client_name')
          .in('client_id', clientIds);
        if (!custErr && customers) {
          customers.forEach(c => { customerMap[c.client_id] = c.client_name; });
        }
      }

      // Gabungkan nama ke data fan
      _all = (fans || []).map(f => ({
        ...f,
        nama: customerMap[f.client_id] || '—'
      }));

    } catch(e) {
      console.error('loadData error:', e);
      _all = [];
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Gagal memuat data: ' + _esc(e.message || String(e)) + '</p></div></td></tr>';
      return;
    }

    document.getElementById('lastUpdated').textContent = 'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');
    updateStats();
    applyFilter();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = _all.length || '—';
    const uniqueInfluencers = new Set(_all.map(f => f.influencer_fan_code).filter(Boolean));
    document.getElementById('statInfluencer').textContent = uniqueInfluencers.size || '—';
    const uniqueSekuritas = new Set(_all.map(f => f.partner_securities).filter(Boolean));
    document.getElementById('statSekuritas').textContent = uniqueSekuritas.size || '—';
  }

  function applyFilter() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    _filtered = _all.filter(r => {
      if (!q) return true;
      return (r.email||'').toLowerCase().includes(q) ||
             (r.nama||'').toLowerCase().includes(q) ||
             (r.client_id||'').toLowerCase().includes(q) ||
             (r.influencer_fan_code||'').toLowerCase().includes(q) ||
             (r.partner_securities||'').toLowerCase().includes(q);
    });
    document.getElementById('totalBadge').textContent = _filtered.length + ' data';
    document.getElementById('tableInfo').textContent = 'Menampilkan ' + _filtered.length + ' dari ' + _all.length + ' data';
    renderTable(_filtered);
  }

  function renderTable(list) {
    const tbody = document.getElementById('tableBody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📋</div><p>' +
        (_all.length === 0 ? 'Belum ada data influencer fan.' : 'Tidak ada hasil yang cocok') +
        '</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map((r, i) => {
      const updatedStr = r.updated_at
        ? new Date(r.updated_at).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
          new Date(r.updated_at).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })
        : '—';
      return `<tr>
        <td style="color:#bbb;font-size:0.8rem;">${i + 1}</td>
        <td style="font-size:0.82rem;color:var(--gray);">${_esc(r.email||'—')}</td>
        <td style="font-weight:700;font-size:0.875rem;color:var(--navy);">${_esc(r.nama||'—')}</td>
        <td><span class="mono">${_esc(r.client_id||'—')}</span></td>
        <td><span class="mono">${_esc(r.influencer_fan_code||'—')}</span></td>
        <td style="font-size:0.82rem;">${_esc(r.partner_securities||'—')}</td>
        <td style="font-size:0.78rem;color:#aaa;">${updatedStr}</td>
      </tr>`;
    }).join('');
  }

  window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
