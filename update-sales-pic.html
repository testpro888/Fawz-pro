function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runUpdate() {
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  document.getElementById('summary').style.display = 'none';

  log(`Mulai update ${MAPPING.length} entri...`, 'warn');
  log('─'.repeat(60));

  // Load all customers first
  log('Mengambil semua data customer dari DB...');
  const { data: customers, error: fetchErr } = await _sb
    .from('customers')
    .select('id, client_name, sales_pic');

  if (fetchErr) {
    log('ERROR mengambil data: ' + fetchErr.message, 'err');
    btn.disabled = false;
    return;
  }
  log(`Total customer di DB: ${customers.length}`, 'ok');
  log('─'.repeat(60));

  let updated = 0, notFound = 0, skipped = 0, errors = 0;

  for (const [nama, sales] of MAPPING) {
    // Case-insensitive match — trim both sides
    const namaLower = nama.trim().toLowerCase();
    const matches = customers.filter(c =>
      c.client_name && c.client_name.trim().toLowerCase() === namaLower
    );

    if (matches.length === 0) {
      log(`[NOT FOUND] ${nama}`, 'skip');
      notFound++;
      continue;
    }

    for (const cust of matches) {
      if (cust.sales_pic === sales) {
        log(`[SKIP - same] ${nama} → ${sales}`, 'skip');
        skipped++;
        continue;
      }

      const { error } = await _sb
        .from('customers')
        .update({ sales_pic: sales })
        .eq('id', cust.id);

      if (error) {
        log(`[ERROR] ${nama} → ${sales} | ${error.message}`, 'err');
        errors++;
      } else {
        log(`[OK] ${nama} | ${cust.sales_pic || 'null'} → ${sales}`, 'ok');
        // update local cache so duplicate names use latest
        cust.sales_pic = sales;
        updated++;
      }
    }
  }

  log('─'.repeat(60));
  const summary = `Selesai — Updated: ${updated} | Tidak ditemukan: ${notFound} | Skip (sama): ${skipped} | Error: ${errors}`;
  log(summary, 'warn');

  const sumEl = document.getElementById('summary');
  sumEl.style.display = 'block';
  sumEl.innerHTML = `<strong style="color:#f5a623;">Hasil:</strong> ✅ Updated: <strong>${updated}</strong> &nbsp;|&nbsp; ⚠️ Tidak ditemukan: <strong>${notFound}</strong> &nbsp;|&nbsp; ⏭ Skip: <strong>${skipped}</strong> &nbsp;|&nbsp; ❌ Error: <strong>${errors}</strong>`;

  btn.disabled = false;
  btn.textContent = '✅ Selesai — Klik lagi untuk ulangi';
}
