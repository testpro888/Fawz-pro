<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d0d2b;--gold:#f5a623;--bg:#f8f9fc;--white:#fff;--border:#e0e0ef;--text:#1a1a3a;--gray:#888;--nav-h:68px;--green:#10b981;--blue:#3b82f6;--shadow:0 2px 10px rgba(0,0,0,0.05)}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;padding-top:var(--nav-h);color:var(--text)}
    .container{max-width:1400px;margin:0 auto;padding:32px 28px}
    .header{margin-bottom:28px}
    .title{font-size:2rem;font-weight:900;color:var(--navy)}
    .subtitle{font-size:0.9rem;color:var(--gray);margin-top:6px}
    .filter-bar{background:var(--white);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:24px}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
    .filter-item{display:flex;flex-direction:column;gap:8px}
    .filter-label{font-size:0.72rem;font-weight:700;color:var(--gray);text-transform:uppercase}
    .filter-select{height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-family:'Inter';font-size:0.875rem;outline:none}
    .filter-select:focus{border-color:var(--gold)}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:28px}
    .kpi-card{background:var(--white);border-radius:14px;padding:24px;box-shadow:var(--shadow)}
    .kpi-label{font-size:0.75rem;color:var(--gray);text-transform:uppercase;margin-bottom:8px}
    .kpi-value{font-size:1.8rem;font-weight:800;color:var(--navy)}
    .chart-card{background:var(--white);border-radius:14px;padding:28px;box-shadow:var(--shadow);margin-bottom:24px}
    .chart-title{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:20px}
    .chart-wrap{height:400px;position:relative}
    @media(max-width:768px){.container{padding:20px 16px}.kpi-grid{grid-template-columns:1fr}.chart-wrap{height:300px}}
  </style>
  <script>
    (function(){
      var r=sessionStorage.getItem('fawz_user')||localStorage.getItem('fawz_user_remember');
      if(!r){window.location.replace('login.html');return}
      sessionStorage.setItem('fawz_user',r);
    })();
  </script>
</head>
<body>
<div id="navbar-placeholder"></div>
<script src="navbar.js?v=4"></script>
<div class="container">
  <div class="header">
    <div class="title">📊 Analytics Dashboard</div>
    <div class="subtitle">Visualisasi data transaksi saham dengan chart interaktif</div>
  </div>
  <div class="filter-bar">
    <div class="filter-grid">
      <div class="filter-item">
        <label class="filter-label">Tahun</label>
        <select id="filterYear" class="filter-select" onchange="loadData()"></select>
      </div>
      <div class="filter-item">
        <label class="filter-label">View</label>
        <select id="filterView" class="filter-select" onchange="onViewChange()">
          <option value="all">Keseluruhan</option>
          <option value="client">Per Nasabah</option>
          <option value="sales">Per Sales</option>
        </select>
      </div>
      <div class="filter-item" id="entityWrap" style="display:none">
        <label class="filter-label" id="entityLabel">Entity</label>
        <select id="filterEntity" class="filter-select" onchange="updateCharts()"></select>
      </div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Volume</div>
      <div class="kpi-value" id="kpiVolume">Rp 0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Fee</div>
      <div class="kpi-value" id="kpiFee">Rp 0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Transaksi</div>
      <div class="kpi-value" id="kpiCount">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nasabah Aktif</div>
      <div class="kpi-value" id="kpiClients">0</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Trend Bulanan - Volume & Fee</div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>
</div>

<script>
let allData=[],curUser=null,mainChart=null;
const MONTHS=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function getCurUser(){const r=sessionStorage.getItem('fawz_user');return r?JSON.parse(r):null}
function formatRp(v){return'Rp '+(parseFloat(v)||0).toLocaleString('id-ID',{maximumFractionDigits:0})}
async function initPage(){
curUser=getCurUser();
const y=document.getElementById('filterYear'),c=new Date().getFullYear();
for(let i=c;i>=2020;i--){const o=document.createElement('option');o.value=i;o.textContent=i;y.appendChild(o)}
await loadData();updateCharts();
}
async function loadData(){
try{
const year=document.getElementById('filterYear').value,start=year+'-01-01',end=year+'-12-31';
const isSales=curUser?.role==='sales',salesName=curUser?.name||'';
allData=[];let offset=0,pageSize=1000,hasMore=true;
while(hasMore){
let q=_sb.from('saham_transaksi').select('*').gte('tanggal',start).lte('tanggal',end).order('tanggal').range(offset,offset+pageSize-1);
if(isSales)q=q.eq('sales_name',salesName);
const{data,error}=await q;if(error)throw error;
const rows=data||[];allData=allData.concat(rows);
if(rows.length<pageSize)hasMore=false;else offset+=pageSize;
}
}catch(e){console.error(e);alert('Error: '+e.message)}
}
function onViewChange(){
const v=document.getElementById('filterView').value,w=document.getElementById('entityWrap'),s=document.getElementById('filterEntity'),l=document.getElementById('entityLabel');
if(v==='all'){w.style.display='none';updateCharts()}
else if(v==='client'){
l.textContent='Nasabah';const m=new Map();
allData.forEach(r=>{if(r.client_id&&r.client_name)m.set(r.client_id,r.client_name)});
s.innerHTML='<option value="">Semua</option>';
Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,nm])=>{const o=document.createElement('option');o.value=id;o.textContent=nm+' ('+id+')';s.appendChild(o)});
w.style.display='block';updateCharts();
}
else if(v==='sales'){
l.textContent='Sales';const st=new Set();
allData.forEach(r=>{if(r.sales_name)st.add(r.sales_name)});
s.innerHTML='<option value="">Semua</option>';
Array.from(st).sort().forEach(sn=>{const o=document.createElement('option');o.value=sn;o.textContent=sn;s.appendChild(o)});
w.style.display='block';updateCharts();
}
}
function updateCharts(){
const v=document.getElementById('filterView').value,e=document.getElementById('filterEntity').value;
let fd=allData;
if(v==='client'&&e)fd=allData.filter(r=>r.client_id===e);
else if(v==='sales'&&e)fd=allData.filter(r=>r.sales_name===e);
let tVol=0,tFee=0,tCnt=fd.length,cl=new Set();
const mVol=new Array(12).fill(0),mFee=new Array(12).fill(0);
fd.forEach(r=>{
tVol+=parseFloat(r.volume)||0;tFee+=parseFloat(r.fee)||0;if(r.client_id)cl.add(r.client_id);
if(r.tanggal){const m=parseInt(r.tanggal.substring(5,7))-1;mVol[m]+=parseFloat(r.volume)||0;mFee[m]+=parseFloat(r.fee)||0}
});
document.getElementById('kpiVolume').textContent=formatRp(tVol);
document.getElementById('kpiFee').textContent=formatRp(tFee);
document.getElementById('kpiCount').textContent=tCnt.toLocaleString('id-ID');
document.getElementById('kpiClients').textContent=cl.size.toLocaleString('id-ID');
renderChart(mVol,mFee);
}
function renderChart(vData,fData){
if(mainChart)mainChart.destroy();
const ctx=document.getElementById('mainChart').getContext('2d');
mainChart=new Chart(ctx,{
type:'bar',
data:{
labels:MONTHS,
datasets:[
{label:'Volume (Rp)',data:vData,backgroundColor:'rgba(245,166,35,0.3)',borderColor:'rgba(245,166,35,1)',borderWidth:2,borderRadius:6,yAxisID:'y'},
{label:'Fee (Rp)',data:fData,type:'line',borderColor:'rgba(16,185,129,1)',backgroundColor:'rgba(16,185,129,0.1)',borderWidth:3,tension:0.4,fill:true,yAxisID:'y1'}
]
},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{position:'top'},tooltip:{backgroundColor:'rgba(13,13,43,0.95)',callbacks:{label:c=>c.dataset.label+': '+formatRp(c.parsed.y)}}},
scales:{
y:{beginAtZero:true,position:'left',ticks:{callback:v=>formatRp(v)},grid:{color:'rgba(0,0,0,0.05)'}},
y1:{beginAtZero:true,position:'right',ticks:{callback:v=>formatRp(v)},grid:{display:false}}
}
}
});
}
window.addEventListener('DOMContentLoaded',initPage);
</script>
</body>
</html>
