<!DOCTYPE html>
<html lang="id">
<head>
  <script src="/config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fawz Pro | Analytics Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = (window.__FAWZ_CONFIG__ || {}).supabaseUrl || '';
    const SUPABASE_KEY = (window.__FAWZ_CONFIG__ || {}).supabaseKey || '';
    const _sbA=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d0d2b;--gold:#f5a623;--bg:#f8f9fc;--white:#fff;--border:#e0e0ef;--text:#1a1a3a;--gray:#888;--nav-h:68px;--green:#10b981;--shadow:0 2px 10px rgba(0,0,0,0.05)}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;padding-top:var(--nav-h);color:var(--text)}
    .container{max-width:1400px;margin:0 auto;padding:32px 28px}
    .page-header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .title{font-size:2rem;font-weight:900;color:var(--navy)}
    .subtitle{font-size:0.9rem;color:var(--gray);margin-top:6px}
    .title-underline{width:48px;height:3px;background:linear-gradient(90deg,var(--gold),#ffc857);border-radius:2px;margin-top:8px}
    .filter-bar{background:var(--white);border-radius:14px;padding:20px 24px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border)}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
    .filter-item{display:flex;flex-direction:column;gap:8px}
    .filter-label{font-size:0.72rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
    .filter-select{height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-family:'Inter';font-size:0.875rem;outline:none;background:var(--white);color:var(--text)}
    .filter-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,0.1)}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:28px}
    .kpi-card{background:var(--white);border-radius:14px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .kpi-card.vol::before{background:linear-gradient(90deg,#f5a623,#ffc857)}
    .kpi-card.fee::before{background:linear-gradient(90deg,#10b981,#34d399)}
    .kpi-card.trx::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
    .kpi-card.nas::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
    .kpi-label{font-size:0.72rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
    .kpi-value{font-size:1.7rem;font-weight:800;color:var(--navy);line-height:1}
    .chart-card{background:var(--white);border-radius:14px;padding:28px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border)}
    .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .chart-title{font-size:1.1rem;font-weight:700;color:var(--navy)}
    .chart-subtitle{font-size:0.8rem;color:var(--gray);margin-top:2px}
    .chart-wrap{height:420px;position:relative}
    .role-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:600;background:rgba(245,166,35,0.12);color:#b8740a;border:1px solid rgba(245,166,35,0.3)}
    @media(max-width:768px){.container{padding:20px 16px}.kpi-grid{grid-template-columns:1fr 1fr}.chart-wrap{height:300px}}
    @media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}
  </style>
  <script>
    (function(){
      var r=sessionStorage.getItem('fawz_user')||localStorage.getItem('fawz_user_remember');
      if(!r){window.location.replace('login.html');return}
      sessionStorage.setItem('fawz_user',r);
    })();
  </script>
</head>
<body>
<div id="navbar-placeholder"></div>
<script src="navbar.js?v=5"></script>
<div class="container">
  <div class="page-header">
    <div>
      <div class="title">📊 Analytics Dashboard</div>
      <div class="subtitle">Visualisasi data transaksi saham per bulan</div>
      <div class="title-underline"></div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-grid">
      <div class="filter-item">
        <label class="filter-label">Tahun</label>
        <select id="filterYear" class="filter-select" onchange="loadData()"></select>
      </div>
      <div class="filter-item" id="viewFilterWrap">
        <label class="filter-label">View</label>
        <select id="filterView" class="filter-select" onchange="onViewChange()">
          <option value="all">Keseluruhan</option>
          <option value="client">Per Nasabah</option>
          <option value="sales">Per Sales</option>
        </select>
      </div>
      <div class="filter-item" id="entityWrap" style="display:none">
        <label class="filter-label" id="entityLabel">Entity</label>
        <select id="filterEntity" class="filter-select" onchange="updateCharts()"></select>
      </div>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card vol">
      <div class="kpi-label">Total Volume</div>
      <div class="kpi-value" id="kpiVolume">Rp 0</div>
    </div>
    <div class="kpi-card fee">
      <div class="kpi-label">Total Fee</div>
      <div class="kpi-value" id="kpiFee">Rp 0</div>
    </div>
    <div class="kpi-card trx">
      <div class="kpi-label">Transaksi</div>
      <div class="kpi-value" id="kpiCount">0</div>
    </div>
    <div class="kpi-card nas">
      <div class="kpi-label">Nasabah Aktif</div>
      <div class="kpi-value" id="kpiClients">0</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Trend Bulanan</div>
        <div class="chart-subtitle" id="chartSubtitle">Volume & Fee per bulan</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>
</div>

<script>
let allData=[],curUser=null,mainChart=null;
const MONTHS=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function getCurUser(){const r=sessionStorage.getItem('fawz_user');return r?JSON.parse(r):null}
function formatRp(v){return'Rp '+(parseFloat(v)||0).toLocaleString('id-ID',{maximumFractionDigits:0})}

async function initPage(){
  curUser=getCurUser();
  const isSales=curUser?.role==='sales';
  const isHeadSales=curUser?.role==='head_sales';

  // Tahun dropdown
  const y=document.getElementById('filterYear'),c=new Date().getFullYear();
  for(let i=c;i>=2020;i--){const o=document.createElement('option');o.value=i;o.textContent=i;y.appendChild(o)}

  // Role badge
  if(isSales){
  }

  // Untuk Sales: sembunyikan filter "Per Sales" karena tidak relevan
  if(isSales){
    const viewSel=document.getElementById('filterView');
    for(let i=viewSel.options.length-1;i>=0;i--){
      if(viewSel.options[i].value==='sales') viewSel.remove(i);
    }
  }

  await loadData();
  updateCharts();
}

async function loadData(){
  try{
    const year=document.getElementById('filterYear').value;
    const start=year+'-01-01',end=year+'-12-31';
    const isSales=curUser?.role==='sales';
    const salesName=curUser?.name||'';

    allData=[];
    let offset=0,pageSize=1000,hasMore=true;
    while(hasMore){
      let q=_sbA.from('saham_transaksi').select('*')
        .gte('tanggal',start).lte('tanggal',end)
        .order('tanggal').range(offset,offset+pageSize-1);
      if(isSales) q=q.ilike('sales_name',salesName);
      const{data,error}=await q;
      if(error)throw error;
      const rows=data||[];
      allData=allData.concat(rows);
      if(rows.length<pageSize)hasMore=false;
      else offset+=pageSize;
    }
    // Update entity dropdowns after new data
    const curView=document.getElementById('filterView').value;
    if(curView!=='all') onViewChange(true);
  }catch(e){
    console.error('loadData error:',e);
  }
}

function onViewChange(keepValue){
  const v=document.getElementById('filterView').value;
  const w=document.getElementById('entityWrap');
  const s=document.getElementById('filterEntity');
  const l=document.getElementById('entityLabel');
  const prevVal=s.value;

  if(v==='all'){
    w.style.display='none';
    updateCharts();
    return;
  }

  if(v==='client'){
    l.textContent='Pilih Nasabah';
    const m=new Map();
    allData.forEach(r=>{if(r.client_id&&r.client_name)m.set(r.client_id,r.client_name)});
    s.innerHTML='<option value="">Semua Nasabah</option>';
    Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1]))
      .forEach(([id,nm])=>{
        const o=document.createElement('option');
        o.value=id; o.textContent=nm+' ('+id+')';
        s.appendChild(o);
      });
    if(keepValue && prevVal) s.value=prevVal;
  }else if(v==='sales'){
    l.textContent='Pilih Sales';
    const st=new Set();
    allData.forEach(r=>{if(r.sales_name)st.add(r.sales_name)});
    s.innerHTML='<option value="">Semua Sales</option>';
    Array.from(st).sort().forEach(sn=>{
      const o=document.createElement('option');
      o.value=sn; o.textContent=sn;
      s.appendChild(o);
    });
    if(keepValue && prevVal) s.value=prevVal;
  }

  w.style.display='block';
  updateCharts();
}

function updateCharts(){
  const v=document.getElementById('filterView').value;
  const e=(document.getElementById('filterEntity').value||'').toLowerCase();

  // Filter data
  let fd=allData;
  if(v==='client'&&e) fd=allData.filter(r=>r.client_id===document.getElementById('filterEntity').value);
  else if(v==='sales'&&e) fd=allData.filter(r=>(r.sales_name||'').toLowerCase()===e);

  // Update subtitle
  let sub='Volume & Fee per bulan';
  if(v==='client'&&e){
    const name=allData.find(r=>r.client_id===document.getElementById('filterEntity').value)?.client_name||e;
    sub='Client: '+name;
  }else if(v==='sales'&&e){
    sub='Sales: '+document.getElementById('filterEntity').value;
  }
  document.getElementById('chartSubtitle').textContent=sub;

  // KPIs
  let tVol=0,tFee=0,cl=new Set();
  const mVol=new Array(12).fill(0),mFee=new Array(12).fill(0);
  fd.forEach(r=>{
    tVol+=parseFloat(r.volume)||0;
    tFee+=parseFloat(r.fee)||0;
    if(r.client_id)cl.add(r.client_id);
    if(r.tanggal){
      const m=parseInt(r.tanggal.substring(5,7))-1;
      mVol[m]+=parseFloat(r.volume)||0;
      mFee[m]+=parseFloat(r.fee)||0;
    }
  });
  document.getElementById('kpiVolume').textContent=formatRp(tVol);
  document.getElementById('kpiFee').textContent=formatRp(tFee);
  document.getElementById('kpiCount').textContent=fd.length.toLocaleString('id-ID');
  document.getElementById('kpiClients').textContent=cl.size.toLocaleString('id-ID');
  renderChart(mVol,mFee);
}

function renderChart(vData,fData){
  if(mainChart)mainChart.destroy();
  const ctx=document.getElementById('mainChart').getContext('2d');
  mainChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:MONTHS,
      datasets:[
        {
          label:'Volume (Rp)',data:vData,
          backgroundColor:'rgba(245,166,35,0.25)',
          borderColor:'rgba(245,166,35,1)',
          borderWidth:2,borderRadius:6,yAxisID:'y'
        },
        {
          label:'Fee (Rp)',data:fData,type:'line',
          borderColor:'rgba(16,185,129,1)',
          backgroundColor:'rgba(16,185,129,0.08)',
          borderWidth:2.5,tension:0.4,fill:true,
          pointRadius:4,pointHoverRadius:6,
          pointBackgroundColor:'rgba(16,185,129,1)',
          yAxisID:'y1'
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',labels:{padding:20,font:{size:12}}},
        tooltip:{
          backgroundColor:'rgba(13,13,43,0.92)',
          padding:14,cornerRadius:10,
          titleFont:{size:12,weight:'600'},
          bodyFont:{size:11},
          callbacks:{label:c=>c.dataset.label+': '+formatRp(c.parsed.y)}
        }
      },
      scales:{
        y:{
          beginAtZero:true,position:'left',
          ticks:{callback:v=>{
            if(v>=1e9)return'Rp '+(v/1e9).toFixed(1)+'M';
            if(v>=1e6)return'Rp '+(v/1e6).toFixed(0)+'jt';
            return'Rp '+v;
          },font:{size:11}},
          grid:{color:'rgba(0,0,0,0.04)'}
        },
        y1:{
          beginAtZero:true,position:'right',
          ticks:{callback:v=>{
            if(v>=1e9)return'Rp '+(v/1e9).toFixed(1)+'M';
            if(v>=1e6)return'Rp '+(v/1e6).toFixed(0)+'jt';
            return'Rp '+v;
          },font:{size:11}},
          grid:{display:false}
        },
        x:{ticks:{font:{size:11}},grid:{display:false}}
      }
    }
  });
}

window.addEventListener('DOMContentLoaded',initPage);
</script>
</body>
</html>
