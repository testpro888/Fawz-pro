const TODAY = new Date().toISOString().slice(0,10);

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runInsert() {
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  document.getElementById('summary').style.display = 'none';

  const mode = document.getElementById('modeSelect').value;
  log(`Mode: ${mode} | Total data: ${BONDS.length}`, 'warn');
  log('─'.repeat(70));

  // Load existing seri
  const { data: existing, error: fetchErr } = await _sb
    .from('obligasi_products')
    .select('id, seri')
    .eq('category', 'gov-idr');

  if (fetchErr) { log('ERROR fetch existing: ' + fetchErr.message, 'err'); btn.disabled=false; return; }

  const existingMap = {};
  (existing || []).forEach(r => { existingMap[r.seri.toUpperCase()] = r.id; });
  log(`Seri sudah ada di DB (gov-idr): ${Object.keys(existingMap).length}`, 'ok');
  log('─'.repeat(70));

  let inserted=0, updated=0, skipped=0, errors=0;

  for (const b of BONDS) {
    const row = {
      seri:            b.seri,
      category:        'gov-idr',
      jatuh_tempo:     b.jatuh_tempo,
      kupon:           b.kupon,
      harga_jual:      b.harga_jual,
      harga_beli:      b.harga_beli,
      yield:           b.yield,
      tanggal_listing: b.tanggal_listing,
      kupon_freq:      b.kupon_freq,
      day_count_basis: 'ACT/ACT',
      bond_type:       b.seri.startsWith('PBS') || b.seri.startsWith('PBSG') ? 'PBS' : 'FR',
      bond_type2:      b.seri.startsWith('PBS') || b.seri.startsWith('PBSG') ? 'Sukuk' : 'Fixed',
      tanggal_update:  TODAY,
      issuer:          'Pemerintah RI',
    };

    const existingId = existingMap[b.seri.toUpperCase()];

    if (existingId) {
      // Seri sudah ada
      if (mode === 'insert_only') {
        log(`[SKIP] ${b.seri} — sudah ada`, 'skip');
        skipped++; continue;
      }
      // UPDATE harga saja
      const updateRow = {
        harga_jual:     b.harga_jual,
        harga_beli:     b.harga_beli,
        yield:          b.yield,
        tanggal_update: TODAY,
      };
      const { error } = await _sb.from('obligasi_products').update(updateRow).eq('id', existingId);
      if (error) { log(`[ERR UPDATE] ${b.seri}: ${error.message}`, 'err'); errors++; }
      else { log(`[UPDATED] ${b.seri} | Bid:${b.harga_jual} Offer:${b.harga_beli} YTM:${b.yield}%`, 'warn'); updated++; }
    } else {
      // Seri belum ada
      if (mode === 'update_only') {
        log(`[SKIP] ${b.seri} — belum ada di DB, skip (update_only mode)`, 'skip');
        skipped++; continue;
      }
      // INSERT baru
      const { error } = await _sb.from('obligasi_products').insert(row);
      if (error) { log(`[ERR INSERT] ${b.seri}: ${error.message}`, 'err'); errors++; }
      else { log(`[INSERTED] ${b.seri} | JT:${b.jatuh_tempo} Kupon:${b.kupon}% YTM:${b.yield}%`, 'ok'); inserted++; }
    }
  }

  log('─'.repeat(70));
  const sum = `Selesai — Inserted: ${inserted} | Updated: ${updated} | Skip: ${skipped} | Error: ${errors}`;
  log(sum, 'warn');
  const s = document.getElementById('summary');
  s.style.display='block';
  s.innerHTML=`<strong style="color:#f5a623;">Hasil:</strong> ✅ Inserted: <b>${inserted}</b> &nbsp;|&nbsp; 🔄 Updated: <b>${updated}</b> &nbsp;|&nbsp; ⏭ Skip: <b>${skipped}</b> &nbsp;|&nbsp; ❌ Error: <b>${errors}</b>`;
  btn.disabled=false;
}
</script>
</body>
</html>
